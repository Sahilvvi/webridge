<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .social-icons {
  display: flex;
  gap: 12px; /* space between icons */
  align-items: center;
}

/* ICON STYLE */
.social-icons a {
  width: 40px;
  height: 40px;

  display: flex;
  align-items: center;
  justify-content: center;

  background: #111;
  color: #fff;
  border-radius: 50%;

  font-size: 14px;
  transition: 0.3s;
}

/* HOVER */
.social-icons a:hover {
  background: #6366f1;
  transform: translateY(-3px);
}
    </style>
</head>
<body>
    <!-- Global -->
<div class="col-md-3">
  <h5>Global Presence</h5>
  <ul>
    <li><a href="#">Dubai Marketing</a></li>
    <li><a href="#">Singapore Marketing</a></li>
    <li><a href="#">USA Marketing</a></li>
    <li><a href="#">India Marketing</a></li>
  </ul>

  <!-- Social Icons -->
  <div class="social-icons mt-4">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-linkedin-in"></i></a>
    <a href="#"><i class="fab fa-youtube"></i></a>
  </div>
</div>
</body>
</html>
